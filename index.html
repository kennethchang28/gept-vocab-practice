<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPT 中級練習｜全民英檢</title>
<style>
  /* ============ 字型設定 ============ */
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg-primary: #fffbf5;
    --bg-paper: #fff7ec;
    --bg-card: #ffffff;
    --ink: #1a1612;
    --ink-soft: #4a4239;
    --ink-mute: #8a7e6f;
    --accent-warm: #d97706;
    --accent-deep: #b45309;
    --accent-go: #059669;
    --accent-stop: #dc2626;
    --accent-cool: #2563eb;
    --accent-purple: #7c3aed;
    --line: #e8dcc8;
    --line-strong: #c9b896;
    --shadow-sm: 0 2px 0 #e8dcc8;
    --shadow-md: 0 4px 0 #c9b896;
    --shadow-lg: 0 6px 0 #b8a378, 0 12px 24px rgba(180, 83, 9, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background:
      radial-gradient(ellipse at top, #fff7e6 0%, transparent 50%),
      radial-gradient(ellipse at bottom, #fef3c7 0%, transparent 50%),
      var(--bg-primary);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
    padding-bottom: 40px;
  }

  /* 紙質顆粒紋理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180, 83, 9, 0.04) 1px, transparent 1px),
      radial-gradient(circle at 60% 70%, rgba(180, 83, 9, 0.03) 1px, transparent 1px);
    background-size: 24px 24px, 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
  }

  /* ============ 標題區 ============ */
  header {
    text-align: center;
    margin-bottom: 32px;
    padding: 24px 0 16px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--accent-warm), transparent);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  .title {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .title .accent {
    color: var(--accent-deep);
    font-style: italic;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--ink-mute);
    margin-top: 8px;
    font-weight: 500;
  }

  .stats-bar {
    display: inline-flex;
    gap: 16px;
    margin-top: 16px;
    padding: 8px 20px;
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-radius: 999px;
    font-size: 0.875rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stats-bar span {
    color: var(--ink-soft);
    font-weight: 500;
  }

  .stats-bar strong {
    color: var(--accent-deep);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ============ 模式選擇 ============ */
  .mode-selector {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .mode-btn {
    background: var(--bg-card);
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow-md);
    font-family: inherit;
    color: var(--ink);
    position: relative;
    overflow: hidden;
  }

  .mode-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 var(--line-strong);
  }

  .mode-btn:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 var(--line-strong);
  }

  .mode-btn.active {
    background: var(--accent-warm);
    color: white;
    border-color: var(--accent-deep);
    box-shadow: 0 4px 0 var(--accent-deep);
  }

  .mode-btn .icon {
    font-size: 1.5rem;
    display: block;
    margin-bottom: 6px;
  }

  .mode-btn .label {
    font-weight: 700;
    font-size: 1rem;
    display: block;
    margin-bottom: 2px;
  }

  .mode-btn .desc {
    font-size: 0.75rem;
    opacity: 0.8;
  }

  /* ============ 主練習區 ============ */
  .practice-area {
    background: var(--bg-card);
    border: 2.5px solid var(--ink);
    border-radius: 20px;
    padding: 32px 28px;
    box-shadow: var(--shadow-lg);
    min-height: 420px;
    position: relative;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px dashed var(--line);
  }

  .progress-info .progress-text {
    font-size: 0.9rem;
    color: var(--ink-mute);
    font-weight: 500;
  }

  .progress-info .progress-text strong {
    color: var(--accent-deep);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1em;
  }

  .progress-bar-wrap {
    flex: 1;
    max-width: 200px;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
    margin-left: 16px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-warm), var(--accent-go));
    transition: width 0.4s ease;
    border-radius: 4px;
  }

  /* ============ 閃卡模式 ============ */
  .flashcard-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .flashcard {
    width: 100%;
    max-width: 480px;
    height: 280px;
    perspective: 1200px;
    cursor: pointer;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }

  .flashcard-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 18px;
    padding: 24px;
    border: 2.5px solid var(--ink);
  }

  .flashcard-front {
    background: linear-gradient(135deg, #fff8e7 0%, #ffeec4 100%);
    box-shadow: 0 4px 0 var(--line-strong);
  }

  .flashcard-back {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    transform: rotateY(180deg);
    box-shadow: 0 4px 0 var(--line-strong);
  }

  .flashcard-word {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .flashcard-pos {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    color: var(--accent-deep);
    background: var(--bg-paper);
    padding: 4px 12px;
    border-radius: 999px;
    border: 1.5px solid var(--line-strong);
    margin-bottom: 16px;
  }

  .flashcard-translation {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.4;
  }

  .flashcard-hint {
    font-size: 0.85rem;
    color: var(--ink-mute);
    margin-top: 16px;
    font-style: italic;
  }

  .flashcard-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ============ 通用按鈕 ============ */
  .btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 12px 20px;
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.12s ease;
    background: var(--bg-card);
    color: var(--ink);
    box-shadow: 0 3px 0 var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 0 var(--ink);
  }

  .btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--ink);
  }

  .btn-primary {
    background: var(--accent-warm);
    color: white;
    border-color: var(--accent-deep);
    box-shadow: 0 3px 0 var(--accent-deep);
  }

  .btn-primary:hover {
    box-shadow: 0 4px 0 var(--accent-deep);
  }

  .btn-primary:active {
    box-shadow: 0 1px 0 var(--accent-deep);
  }

  .btn-success {
    background: var(--accent-go);
    color: white;
    border-color: #047857;
    box-shadow: 0 3px 0 #047857;
  }

  .btn-success:hover { box-shadow: 0 4px 0 #047857; }
  .btn-success:active { box-shadow: 0 1px 0 #047857; }

  .btn-warn {
    background: #f59e0b;
    color: white;
    border-color: #b45309;
    box-shadow: 0 3px 0 #b45309;
  }

  .btn-warn:hover { box-shadow: 0 4px 0 #b45309; }
  .btn-warn:active { box-shadow: 0 1px 0 #b45309; }

  .btn-cool {
    background: var(--accent-cool);
    color: white;
    border-color: #1e40af;
    box-shadow: 0 3px 0 #1e40af;
  }

  .btn-cool:hover { box-shadow: 0 4px 0 #1e40af; }
  .btn-cool:active { box-shadow: 0 1px 0 #1e40af; }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: 0 3px 0 var(--ink) !important;
  }

  /* ============ 選擇題模式 ============ */
  .quiz-question {
    text-align: center;
    margin-bottom: 32px;
  }

  .quiz-prompt-label {
    font-size: 0.875rem;
    color: var(--ink-mute);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .quiz-word {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .quiz-pos {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    color: var(--accent-deep);
    margin-bottom: 8px;
  }

  .quiz-meaning {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--ink);
    padding: 16px;
    background: var(--bg-paper);
    border: 2px dashed var(--line-strong);
    border-radius: 12px;
    display: inline-block;
    min-width: 200px;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .quiz-option {
    text-align: left;
    padding: 16px 18px;
    background: var(--bg-card);
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 3px 0 var(--ink);
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quiz-option:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 0 var(--ink);
    background: var(--bg-paper);
  }

  .quiz-option:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--ink);
  }

  .quiz-option .opt-letter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent-warm);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .quiz-option .opt-text {
    flex: 1;
    font-weight: 500;
    word-break: break-word;
  }

  .quiz-option.correct {
    background: #d1fae5;
    border-color: var(--accent-go);
    box-shadow: 0 3px 0 var(--accent-go);
  }

  .quiz-option.correct .opt-letter {
    background: var(--accent-go);
  }

  .quiz-option.wrong {
    background: #fee2e2;
    border-color: var(--accent-stop);
    box-shadow: 0 3px 0 var(--accent-stop);
  }

  .quiz-option.wrong .opt-letter {
    background: var(--accent-stop);
  }

  .quiz-option:disabled {
    cursor: default;
  }

  /* ============ 拼字模式 ============ */
  .spell-prompt {
    text-align: center;
    margin-bottom: 28px;
  }

  .spell-meaning {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--ink);
    margin: 12px 0 4px;
  }

  .spell-pos {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    color: var(--accent-deep);
    margin-bottom: 16px;
  }

  .spell-hint {
    color: var(--ink-mute);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  .spell-input-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .spell-input {
    width: 100%;
    max-width: 400px;
    padding: 18px 20px;
    font-size: 1.5rem;
    font-family: 'Fraunces', serif;
    text-align: center;
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    background: var(--bg-paper);
    color: var(--ink);
    box-shadow: 0 3px 0 var(--ink);
    letter-spacing: 0.02em;
    transition: all 0.15s ease;
  }

  .spell-input:focus {
    outline: none;
    border-color: var(--accent-warm);
    box-shadow: 0 3px 0 var(--accent-deep);
  }

  .spell-input.shake {
    animation: shake 0.4s;
    border-color: var(--accent-stop);
    background: #fee2e2;
  }

  .spell-input.correct-answer {
    border-color: var(--accent-go);
    background: #d1fae5;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .spell-letters {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.75rem;
    letter-spacing: 0.4em;
    color: var(--ink-mute);
    background: var(--bg-paper);
    padding: 12px 24px;
    border-radius: 12px;
    border: 2px dashed var(--line-strong);
  }

  /* ============ 聽力模式 ============ */
  .listen-area {
    text-align: center;
  }

  .listen-icon-wrap {
    display: inline-block;
    margin: 20px 0 28px;
  }

  .listen-icon {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-warm), var(--accent-deep));
    border: 3px solid var(--ink);
    box-shadow: 0 6px 0 var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 3.5rem;
    color: white;
    position: relative;
  }

  .listen-icon:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 var(--ink);
  }

  .listen-icon:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 var(--ink);
  }

  .listen-icon.playing {
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .listen-prompt {
    font-size: 1.1rem;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }

  .listen-replay-hint {
    font-size: 0.875rem;
    color: var(--ink-mute);
    margin-bottom: 24px;
  }

  /* ============ 結果回饋 ============ */
  .feedback {
    padding: 16px 20px;
    border-radius: 12px;
    margin-top: 16px;
    text-align: center;
    font-weight: 600;
    border: 2px solid;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.success {
    background: #d1fae5;
    color: #047857;
    border-color: var(--accent-go);
  }

  .feedback.error {
    background: #fee2e2;
    color: #991b1b;
    border-color: var(--accent-stop);
  }

  .feedback.info {
    background: #dbeafe;
    color: #1e40af;
    border-color: var(--accent-cool);
  }

  /* ============ 動作列 ============ */
  .action-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
  }

  /* ============ 統計／設定 ============ */
  .settings-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2px dashed var(--line);
  }

  .setting-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--bg-paper);
    border: 1.5px solid var(--line-strong);
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.12s ease;
    font-family: inherit;
  }

  .setting-chip:hover {
    background: var(--bg-card);
    border-color: var(--accent-warm);
  }

  .setting-chip.active {
    background: var(--accent-warm);
    color: white;
    border-color: var(--accent-deep);
  }

  /* ============ Modal ============ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal-overlay.show {
    display: flex;
    animation: fadeIn 0.2s;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-card);
    border: 2.5px solid var(--ink);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
  }

  .modal h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .modal p {
    color: var(--ink-soft);
    margin-bottom: 16px;
  }

  /* ============ 底部資訊 ============ */
  footer {
    text-align: center;
    padding: 32px 16px 16px;
    color: var(--ink-mute);
    font-size: 0.85rem;
  }

  footer a {
    color: var(--accent-deep);
    text-decoration: none;
  }

  /* ============ 響應式 ============ */
  @media (max-width: 600px) {
    .container { padding: 16px 12px; }
    .practice-area { padding: 20px 16px; }
    .quiz-options { grid-template-columns: 1fr; }
    .flashcard { height: 240px; }
    .mode-selector { grid-template-columns: 1fr 1fr; }
    .mode-btn { padding: 14px 12px; }
    .mode-btn .label { font-size: 0.9rem; }
    .mode-btn .desc { font-size: 0.7rem; }
    .stats-bar { font-size: 0.8rem; padding: 6px 14px; gap: 10px; }
  }

  /* ============ 閱讀測驗 ============ */
  .reading-passage {
    background: var(--bg-paper);
    border: 2px solid var(--line-strong);
    border-radius: 14px;
    padding: 26px 28px;
    margin-bottom: 24px;
    min-height: 520px;
    max-height: none;
    overflow-y: visible;
  }

  .reading-title {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px dashed var(--line-strong);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .reading-type-badge {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 10px;
    background: var(--accent-warm);
    color: white;
    border-radius: 999px;
    letter-spacing: 0.05em;
  }

  .reading-text {
    font-family: 'Fraunces', serif;
    font-size: 1.08rem;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre-line;
  }

  .reading-text p {
    margin-bottom: 12px;
  }

  .reading-text p:last-child {
    margin-bottom: 0;
  }

  .reading-question {
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 2px solid var(--ink);
    border-radius: 12px;
    box-shadow: 0 3px 0 var(--ink);
  }

  .reading-q-text {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);

    color: white;
  }

// ============================================================
// 進度管理（localStorage）
// ============================================================
const STORAGE_KEY = 'gept_intermediate_progress_v1';
const SETTINGS_KEY = 'gept_intermediate_settings_v1';

const Progress = {
  data: {},
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      this.data = raw ? JSON.parse(raw) : {};
    } catch (e) {
      this.data = {};
    }
  },
  save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.data));
    } catch (e) {}
  },
  getStatus(word) {
    return this.data[word] || { seen: 0, correct: 0, wrong: 0, mastered: false };
  },
  markCorrect(word) {
    const s = this.getStatus(word);
    s.seen = (s.seen || 0) + 1;
    s.correct = (s.correct || 0) + 1;
    if (s.correct >= 3) s.mastered = true;
    this.data[word] = s;
    this.save();
  },
  markWrong(word) {
    const s = this.getStatus(word);
    s.seen = (s.seen || 0) + 1;
    s.wrong = (s.wrong || 0) + 1;
    s.mastered = false;
    this.data[word] = s;
    this.save();
  },
  markSeen(word) {
    const s = this.getStatus(word);
    s.seen = (s.seen || 0) + 1;
    this.data[word] = s;
    this.save();
  },
  toggleMastered(word) {
    const s = this.getStatus(word);
    s.mastered = !s.mastered;
    this.data[word] = s;
    this.save();
  },
  reset() {
    this.data = {};
    localStorage.removeItem(STORAGE_KEY);
  },
  getStats() {
    let known = 0, learning = 0;
    for (const w of ALL_WORDS) {
      const s = this.getStatus(w.w);
      if (s.mastered) known++;
      else if (s.seen > 0) learning++;
    }
    return { total: ALL_WORDS.length, known, learning };
  }
};

const Settings = {
  data: { mode: 'flashcard', filter: 'all', autoSpeak: true },
  load() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (raw) Object.assign(this.data, JSON.parse(raw));
    } catch (e) {}
  },
  save() {
    try {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(this.data));
    } catch (e) {}
  }
};

// ============================================================
// 工具函數
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n, excludeWord) {
  const pool = arr.filter(x => x.w !== excludeWord);
  return shuffle(pool).slice(0, n);
}

function getFilteredWords() {
  const filter = Settings.data.filter || 'all';
  if (filter === 'all') return ALL_WORDS;
  if (filter === 'unlearned') {
    return ALL_WORDS.filter(w => !Progress.getStatus(w.w).mastered);
  }
  if (filter === 'learning') {
    return ALL_WORDS.filter(w => {
      const s = Progress.getStatus(w.w);
      return s.seen > 0 && !s.mastered;
    });
  }
  return ALL_WORDS;
}

// ============================================================
// 語音合成
// ============================================================
const Speech = {
  voice: null,
  enabled: 'speechSynthesis' in window,
  init() {
    if (!this.enabled) return;
    const setVoice = () => {
      const voices = speechSynthesis.getVoices();
      // 優先選英美女聲
      const preferred = voices.find(v => /en-US/i.test(v.lang) && /female|samantha|karen|zira/i.test(v.name))
        || voices.find(v => /en-US/i.test(v.lang))
        || voices.find(v => /en-GB/i.test(v.lang))
        || voices.find(v => /en/i.test(v.lang));
      this.voice = preferred || voices[0];
    };
    setVoice();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = setVoice;
    }
  },
  speak(text, opts = {}) {
    if (!this.enabled) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (this.voice) u.voice = this.voice;
    u.rate = opts.rate || 0.9;
    u.pitch = opts.pitch || 1;
    u.volume = 1;
    u.lang = 'en-US';
    speechSynthesis.speak(u);
  }
};

// ============================================================
// 模式管理
// ============================================================
const App = {
  currentMode: 'flashcard',
  currentWord: null,
  currentPool: [],
  poolIndex: 0,
  streak: 0,

  init() {
    Progress.load();
    Settings.load();
    Speech.init();
    this.currentMode = Settings.data.mode || 'flashcard';
    this.bindModeButtons();
    this.refreshPool();
    this.updateStats();
    this.updateModeButtons();
    this.render();
  },

  bindModeButtons() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.currentMode = btn.dataset.mode;
        Settings.data.mode = this.currentMode;
        Settings.save();
        this.refreshPool();
        this.updateModeButtons();
        this.render();
      });
    });
  },

  updateModeButtons() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === this.currentMode);
    });
  },

  refreshPool() {
    this.currentPool = shuffle(getFilteredWords());
    this.poolIndex = 0;
    if (this.currentPool.length === 0) {
      this.currentPool = shuffle(ALL_WORDS);
    }
  },

  nextWord() {
    if (this.poolIndex >= this.currentPool.length) {
      this.refreshPool();
    }
    this.currentWord = this.currentPool[this.poolIndex++];
    return this.currentWord;
  },

  updateStats() {
    const s = Progress.getStats();
    document.getElementById('stat-total').textContent = s.total;
    document.getElementById('stat-known').textContent = s.known;
    document.getElementById('stat-learning').textContent = s.learning;
    document.getElementById('footer-count').textContent = s.total;
  },

  render() {
    const area = document.getElementById('practiceArea');
    if (this.currentMode === 'flashcard') this.renderFlashcard(area);
    else if (this.currentMode === 'quiz') this.renderQuiz(area);
    else if (this.currentMode === 'listen') this.renderListen(area);
    else if (this.currentMode === 'cloze') this.renderCloze(area);
    else if (this.currentMode === 'reading') this.renderReading(area);
    this.updateStats();
  },

  // ============================================================
  // 進度條 + 過濾選項
  // ============================================================
  renderProgressBar() {
    const s = Progress.getStats();
    const pct = s.total ? Math.round((s.known / s.total) * 100) : 0;
    const filter = Settings.data.filter || 'all';
    return `
      <div class="progress-info">
        <div class="progress-text">
          熟練度 <strong>${pct}%</strong> · 連續答對 <strong>${this.streak}</strong>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      </div>
    `;
  },

  renderSettingsRow() {
    const filter = Settings.data.filter || 'all';
    return `
      <div class="settings-row">
        <span style="font-size:0.85rem;color:var(--ink-mute);">範圍：</span>
        <button class="setting-chip ${filter==='all'?'active':''}" onclick="App.setFilter('all')">全部</button>
        <button class="setting-chip ${filter==='unlearned'?'active':''}" onclick="App.setFilter('unlearned')">未熟練</button>
        <button class="setting-chip ${filter==='learning'?'active':''}" onclick="App.setFilter('learning')">學習中</button>
        <button class="setting-chip" onclick="openResetModal()" title="重設進度">🔄 重設</button>
      </div>
    `;
  },

  setFilter(filter) {
    Settings.data.filter = filter;
    Settings.save();
    this.refreshPool();
    this.streak = 0;
    this.render();
  },

  // ============================================================
  // 1. 閃卡模式
  // ============================================================
  renderFlashcard(area) {
    if (!this.currentWord) this.nextWord();
    const w = this.currentWord;
    const status = Progress.getStatus(w.w);

    area.innerHTML = `
      ${this.renderProgressBar()}
      <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
          <div class="flashcard-inner">
            <div class="flashcard-face flashcard-front">
              <div class="flashcard-word">${w.w}</div>
              <div class="flashcard-pos">${w.p}</div>
              <div class="flashcard-hint">點一下卡片看意思 · 或按 🔊 聽發音</div>
            </div>
            <div class="flashcard-face flashcard-back">
              <div class="flashcard-translation">${w.t}</div>
              <div class="flashcard-hint" style="margin-top:20px;">${w.w} <em style="color:var(--ink-mute)">${w.p}</em></div>
            </div>
          </div>
        </div>
        <div class="flashcard-controls">
          <button class="btn btn-cool" onclick="App.speakCurrent()">🔊 發音</button>
          <button class="btn btn-success" onclick="App.markFlashcardKnown()">${status.mastered ? '✓ 已熟練' : '✓ 我會了'}</button>
          <button class="btn btn-warn" onclick="App.markFlashcardLearning()">繼續學</button>
          <button class="btn btn-primary" onclick="App.nextFlashcard()">下一張 →</button>
        </div>
      </div>
      ${this.renderSettingsRow()}
    `;

    const card = document.getElementById('flashcard');
    card.addEventListener('click', () => {
      card.classList.toggle('flipped');
      if (card.classList.contains('flipped')) {
        Progress.markSeen(w.w);
      }
    });

    if (Settings.data.autoSpeak) {
      setTimeout(() => Speech.speak(w.w), 250);
    }
  },

  speakCurrent() {
    if (this.currentWord) Speech.speak(this.currentWord.w);
  },

  markFlashcardKnown() {
    if (!this.currentWord) return;
    Progress.markCorrect(this.currentWord.w);
    Progress.data[this.currentWord.w].mastered = true;
    Progress.save();
    this.streak++;
    this.nextFlashcard();
  },

  markFlashcardLearning() {
    if (!this.currentWord) return;
    const s = Progress.getStatus(this.currentWord.w);
    s.mastered = false;
    s.seen = (s.seen || 0) + 1;
    Progress.data[this.currentWord.w] = s;
    Progress.save();
    this.streak = 0;
    this.nextFlashcard();
  },

  nextFlashcard() {
    this.nextWord();
    this.render();
  },

  // ============================================================
  // 2. 選擇題模式
  // ============================================================
  renderQuiz(area) {
    if (!this.currentWord) this.nextWord();
    const w = this.currentWord;
    // 隨機決定題型：英→中 或 中→英
    const isEnToCh = Math.random() < 0.5;
    this._currentQuizDir = isEnToCh ? 'en2ch' : 'ch2en';

    const wrongs = pickRandom(ALL_WORDS, 3, w.w);
    const allOpts = shuffle([w, ...wrongs]);
    this._currentQuizOptions = allOpts;
    this._currentQuizAnswer = w;

    const letters = ['A', 'B', 'C', 'D'];
    const optionsHtml = allOpts.map((opt, i) => {
      const text = isEnToCh ? opt.t : `${opt.w}`;
      return `
        <button class="quiz-option" data-idx="${i}" onclick="App.checkQuizAnswer(${i})">
          <div class="opt-letter">${letters[i]}</div>
          <div class="opt-text">${text}</div>
        </button>
      `;
    }).join('');

    const promptArea = isEnToCh
      ? `
        <div class="quiz-prompt-label">這個英文單字是什麼意思？</div>
        <div class="quiz-word">${w.w}</div>
        <div class="quiz-pos">${w.p}</div>
        <div style="margin-top:8px;">
          <button class="btn btn-cool" onclick="App.speakCurrent()" style="font-size:0.85rem;padding:8px 14px;">🔊 聽發音</button>
        </div>
      `
      : `
        <div class="quiz-prompt-label">下面哪個英文單字是這個意思？</div>
        <div class="quiz-meaning">${w.t}</div>
        <div class="quiz-pos" style="margin-top:8px;">${w.p}</div>
      `;

    area.innerHTML = `
      ${this.renderProgressBar()}
      <div class="quiz-question">${promptArea}</div>
      <div class="quiz-options" id="quizOptions">${optionsHtml}</div>
      <div id="quizFeedback"></div>
      <div class="action-row" id="quizActions"></div>
      ${this.renderSettingsRow()}
    `;
  },

  checkQuizAnswer(idx) {
    const opts = this._currentQuizOptions;
    const answer = this._currentQuizAnswer;
    const chosen = opts[idx];
    const optionEls = document.querySelectorAll('#quizOptions .quiz-option');
    optionEls.forEach(el => el.disabled = true);

    const correctIdx = opts.indexOf(answer);
    const fb = document.getElementById('quizFeedback');

    if (chosen.w === answer.w) {
      optionEls[idx].classList.add('correct');
      Progress.markCorrect(answer.w);
      this.streak++;
      const cheers = ['答對了！🎉', '太棒了！👍', '正確！✨', '答對！繼續加油 💪', '完美！🌟'];
      fb.innerHTML = `<div class="feedback success">${cheers[Math.floor(Math.random()*cheers.length)]} <strong>${answer.w}</strong> = ${answer.t}</div>`;
      Speech.speak(answer.w);
    } else {
      optionEls[idx].classList.add('wrong');
      optionEls[correctIdx].classList.add('correct');
      Progress.markWrong(answer.w);
      this.streak = 0;
      fb.innerHTML = `<div class="feedback error">沒關係，再記一次！正確答案是 <strong>${answer.w}</strong> = ${answer.t}</div>`;
      Speech.speak(answer.w);
    }

    document.getElementById('quizActions').innerHTML = `
      <button class="btn btn-primary" onclick="App.nextQuiz()" id="nextQuizBtn" autofocus>下一題 →</button>
    `;
    setTimeout(() => {
      const btn = document.getElementById('nextQuizBtn');
      if (btn) btn.focus();
    }, 80);
  },

  nextQuiz() {
    this.nextWord();
    this.render();
  },

  // ============================================================
  // 4. 聽力模式
  // ============================================================
  renderListen(area) {
    if (!Speech.enabled) {
      area.innerHTML = `
        <div class="feedback error">
          您的瀏覽器不支援語音播放功能。建議使用 Chrome、Edge 或 Safari 瀏覽器。
        </div>
      `;
      return;
    }

    if (!this.currentWord) this.nextWord();
    const w = this.currentWord;
    const wrongs = pickRandom(ALL_WORDS, 3, w.w);
    const allOpts = shuffle([w, ...wrongs]);
    this._currentListenOptions = allOpts;
    this._currentListenAnswer = w;

    const letters = ['A', 'B', 'C', 'D'];
    const optionsHtml = allOpts.map((opt, i) => `
      <button class="quiz-option" data-idx="${i}" onclick="App.checkListenAnswer(${i})">
        <div class="opt-letter">${letters[i]}</div>
        <div class="opt-text">${opt.t}</div>
      </button>
    `).join('');

    area.innerHTML = `
      ${this.renderProgressBar()}
      <div class="listen-area">
        <div class="quiz-prompt-label">仔細聽，選出正確的單字</div>
        <div class="listen-icon-wrap">
          <div class="listen-icon" id="listenIcon" onclick="App.playListen()">🔊</div>
        </div>
        <div class="listen-prompt">點上面的喇叭聽單字發音</div>
        <div class="listen-replay-hint">可以多聽幾次再回答</div>
      </div>
      <div class="quiz-options" id="quizOptions">${optionsHtml}</div>
      <div id="listenFeedback"></div>
      <div class="action-row" id="listenActions"></div>
      ${this.renderSettingsRow()}
    `;

    // 自動播放一次
    setTimeout(() => this.playListen(), 300);
  },

  playListen() {
    const icon = document.getElementById('listenIcon');
    if (icon) {
      icon.classList.add('playing');
      setTimeout(() => icon.classList.remove('playing'), 1500);
    }
    Speech.speak(this._currentListenAnswer.w, { rate: 0.85 });
  },

  checkListenAnswer(idx) {
    const opts = this._currentListenOptions;
    const answer = this._currentListenAnswer;
    const chosen = opts[idx];
    const optionEls = document.querySelectorAll('#quizOptions .quiz-option');
    optionEls.forEach(el => el.disabled = true);

    const correctIdx = opts.indexOf(answer);
    const fb = document.getElementById('listenFeedback');

    if (chosen.w === answer.w) {
      optionEls[idx].classList.add('correct');
      Progress.markCorrect(answer.w);
      this.streak++;
      fb.innerHTML = `<div class="feedback success">聽對了！🎧✨ <strong>${answer.w}</strong> = ${answer.t}</div>`;
    } else {
      optionEls[idx].classList.add('wrong');
      optionEls[correctIdx].classList.add('correct');
      Progress.markWrong(answer.w);
      this.streak = 0;
      fb.innerHTML = `<div class="feedback error">差一點！正確的是 <strong>${answer.w}</strong> = ${answer.t}</div>`;
    }

    document.getElementById('listenActions').innerHTML = `
      <button class="btn btn-cool" onclick="App.playListen()">🔊 再聽一次</button>
      <button class="btn btn-primary" onclick="App.nextListen()" id="nextListenBtn">下一題 →</button>
    `;
    setTimeout(() => {
      const btn = document.getElementById('nextListenBtn');
      if (btn) btn.focus();
    }, 80);
  },

  nextListen() {
    this.nextWord();
    this.render();
  },

  // ============================================================
  // 5. 克漏字模式（GEPT 段落填空格式）
  // ============================================================
  clozeState: { passage: null, answers: [], submitted: false },

  initClozeSession() {
    // 隨機抽一篇文章
    const passage = CLOZE_PASSAGES[Math.floor(Math.random() * CLOZE_PASSAGES.length)];
    this.clozeState = {
      passage: passage,
      answers: new Array(passage.blanks.length).fill(null),
      submitted: false
    };
  },

  renderCloze(area) {
    if (!this.clozeState.passage) {
      this.initClozeSession();
    }

    const p = this.clozeState.passage;
    const submitted = this.clozeState.submitted;

    // 把文章中的 [1], [2], ... 替換成題目標記
    let displayPassage = this.escapeHtml(p.passage);
    for (let i = 0; i < p.blanks.length; i++) {
      const num = i + 1;
      const userAns = this.clozeState.answers[i];
      const correct = p.blanks[i].ans;

      let blankHtml;
      if (submitted) {
        const isCorrect = userAns === correct;
        const userText = userAns !== null ? p.blanks[i].opts[userAns] : '（未作答）';
        const correctText = p.blanks[i].opts[correct];
        if (isCorrect) {
          blankHtml = `<span class="cloze-blank-filled correct" title="答對了！">(${num}) <strong>${userText}</strong> ✓</span>`;
        } else {
          blankHtml = `<span class="cloze-blank-filled wrong" title="正確答案：${correctText}">(${num}) <s>${userText}</s> → <strong>${correctText}</strong></span>`;
        }
      } else {
        const filled = userAns !== null ? p.blanks[i].opts[userAns] : '';
        if (filled) {
          blankHtml = `<span class="cloze-blank-filled" data-blank="${i}">(${num}) <strong>${this.escapeHtml(filled)}</strong></span>`;
        } else {
          blankHtml = `<span class="cloze-blank-empty" data-blank="${i}">(${num}) ______</span>`;
        }
      }
      displayPassage = displayPassage.replace(`[${num}]`, blankHtml);
    }
    // 段落分隔
    displayPassage = displayPassage.split('\n\n').map(para => `<p>${para}</p>`).join('');

    // 題目選項區
    const questionsHtml = p.blanks.map((blank, i) => {
      const userAns = this.clozeState.answers[i];
      const correct = blank.ans;
      const optsHtml = blank.opts.map((opt, j) => {
        let cls = 'cloze-opt';
        if (submitted) {
          if (j === correct) cls += ' correct';
          else if (j === userAns && j !== correct) cls += ' wrong';
          if (j === userAns) cls += ' chosen';
        } else {
          if (j === userAns) cls += ' chosen';
        }
        const disabled = submitted ? 'disabled' : '';
        const action = submitted ? '' : `onclick="App.selectClozeOption(${i}, ${j})"`;
        return `<button class="${cls}" ${action} ${disabled}>
          <span class="cloze-opt-letter">${'ABCD'[j]}</span>
          <span class="cloze-opt-text">${this.escapeHtml(opt)}</span>
        </button>`;
      }).join('');

      return `
        <div class="cloze-q-block ${submitted ? (userAns === correct ? 'q-correct' : 'q-wrong') : ''}">
          <div class="cloze-q-num">第 ${i + 1} 題</div>
          <div class="cloze-opts-grid">${optsHtml}</div>
        </div>
      `;
    }).join('');

    // 動作按鈕
    const answeredCount = this.clozeState.answers.filter(a => a !== null).length;
    const totalQ = p.blanks.length;
    let actionHtml;
    if (submitted) {
      const score = this.clozeState.answers.filter((a, i) => a === p.blanks[i].ans).length;
      const pct = Math.round((score / totalQ) * 100);
      let emoji, msg;
      if (pct === 100) { emoji = '🏆'; msg = '滿分！太厲害了！'; }
      else if (pct >= 80) { emoji = '🌟'; msg = '表現很棒！'; }
      else if (pct >= 60) { emoji = '💪'; msg = '不錯，繼續加油！'; }
      else { emoji = '🌱'; msg = '看一下解析，下次會更好！'; }
      actionHtml = `
        <div class="cloze-result">
          <div class="cloze-result-emoji">${emoji}</div>
          <div class="cloze-result-msg">${msg}</div>
          <div class="cloze-result-score">${score} / ${totalQ}</div>
          <div class="cloze-result-pct">正確率 ${pct}%</div>
        </div>
        <div class="action-row">
          <button class="btn btn-primary" onclick="App.restartCloze()">換一篇文章 →</button>
        </div>
      `;
    } else {
      const allAnswered = answeredCount === totalQ;
      actionHtml = `
        <div class="action-row">
          <button class="btn ${allAnswered ? 'btn-primary' : ''}" onclick="App.submitCloze()" ${!allAnswered ? 'disabled' : ''}>
            ${allAnswered ? '送出答案 ✓' : `還有 ${totalQ - answeredCount} 題未作答`}
          </button>
          <button class="btn" onclick="App.restartCloze()">換一篇 🔄</button>
        </div>
      `;
    }

    area.innerHTML = `
      <div class="cloze-progress-bar">
        <div class="cloze-progress-text">
          <strong>${p.title}</strong> · 已作答 ${answeredCount} / ${totalQ}
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${(answeredCount / totalQ * 100)}%"></div>
        </div>
      </div>

      <div class="cloze-intro">${this.escapeHtml(p.intro)}</div>

      <div class="cloze-passage-box">
        <div class="cloze-passage-title">${this.escapeHtml(p.title)}</div>
        <div class="cloze-passage-text">${displayPassage}</div>
      </div>

      <div class="cloze-questions">
        ${questionsHtml}
      </div>

      ${actionHtml}
    `;

    // 滾動到尚未作答的第一題（提交後則滾到結果）
    if (!submitted && answeredCount > 0 && answeredCount < totalQ) {
      // 不自動滾動，讓使用者自己控制
    }
  },

  escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  },

  selectClozeOption(blankIdx, optIdx) {
    if (this.clozeState.submitted) return;
    this.clozeState.answers[blankIdx] = optIdx;
    this.render();
  },

  submitCloze() {
    if (this.clozeState.answers.includes(null)) return;
    this.clozeState.submitted = true;
    this.render();
    // 滾動到結果區
    setTimeout(() => {
      const result = document.querySelector('.cloze-result');
      if (result) result.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  },

  restartCloze() {
    this.initClozeSession();
    this.render();
    // 滾到頂端
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },

  // ============================================================
  // 6. 閱讀測驗模式
  // ============================================================
  readingState: { questions: [], idx: 0, score: 0, answered: 0, totalQuestions: 0 },

  initReadingSession() {
    const target = 20;
    const eligiblePassages = READING_PASSAGES.filter(passage => passage.type !== '短');
    const passages = shuffle(eligiblePassages).map(passage => {
      const count = Math.min(passage.questions.length, Math.random() < 0.5 ? 2 : 3);
      return {
        passage,
        qs: shuffle(passage.questions).slice(0, count),
        answers: Array(count).fill(null)
      };
    });
    const picked = [];
    let totalQuestions = 0;
    for (const item of passages) {
      if (totalQuestions >= target) break;
      picked.push(item);
      totalQuestions += item.qs.length;
    }
    this.readingState = {
      questions: picked,
      idx: 0,
      score: 0,
      answered: 0,
      totalQuestions
    };
  },

  renderReading(area) {
    if (!this.readingState.questions || this.readingState.questions.length === 0) {
      this.initReadingSession();
    }
    if (this.readingState.idx >= this.readingState.questions.length) {
      this.renderReadingFinish(area);
      return;
    }
    const cur = this.readingState.questions[this.readingState.idx];
    const passage = cur.passage;

    const letters = ['A', 'B', 'C', 'D'];
    const questionsHtml = cur.qs.map((q, qIdx) => {
      const optionsHtml = q.opts.map((opt, i) => `
        <button class="quiz-option" data-idx="${i}" onclick="App.checkReadingAnswer(${qIdx}, ${i})">
          <div class="opt-letter">${letters[i]}</div>
          <div class="opt-text">${opt}</div>
        </button>
      `).join('');
      return `
        <div class="reading-question">
          <div class="quiz-prompt-label">問題 ${qIdx + 1}</div>
          <div class="reading-q-text">${q.q}</div>
        </div>
        <div class="quiz-options" id="quizOptions${qIdx}">${optionsHtml}</div>
      `;
    }).join('');

    area.innerHTML = `
      ${this.renderReadingProgress()}
      <div class="reading-passage">
        <div class="reading-title">${passage.title} <span class="reading-type-badge">${passage.type === '長' || passage.type === '較長' ? '較長' : '中等'}</span></div>
        <div class="reading-text">${passage.passage.split('\n\n').map(p => '<p>' + p + '</p>').join('')}</div>
      </div>
      ${questionsHtml}
      <div id="readingFeedback"></div>
      <div class="action-row" id="readingActions"></div>
      ${this.renderReadingSettings()}
    `;
  },

  renderReadingProgress() {
    const s = this.readingState;
    const total = s.totalQuestions || s.questions.reduce((sum, item) => sum + item.qs.length, 0);
    const pct = total ? Math.round((s.answered / total) * 100) : 0;
    return `
      <div class="progress-info">
        <div class="progress-text">
          第 <strong>${Math.min(s.idx + 1, s.questions.length)}</strong> / ${s.questions.length} 篇 · 已作答 <strong>${s.answered}</strong> / ${total} 題 · 答對 <strong>${s.score}</strong>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      </div>
    `;
  },

  renderReadingSettings() {
    return `
      <div class="settings-row">
        <button class="setting-chip" onclick="App.restartReading()">🔄 重新開始閱讀測驗</button>
      </div>
    `;
  },

  restartReading() {
    this.initReadingSession();
    this.render();
  },

  checkReadingAnswer(qIdx, idx) {
    const cur = this.readingState.questions[this.readingState.idx];
    if (!cur || cur.answers[qIdx] !== null) return;

    const q = cur.qs[qIdx];
    const correct = q.ans;
    const optionEls = document.querySelectorAll(`#quizOptions${qIdx} .quiz-option`);
    optionEls.forEach(el => el.disabled = true);
    cur.answers[qIdx] = idx;

    const fb = document.getElementById('readingFeedback');
    this.readingState.answered++;

    if (idx === correct) {
      optionEls[idx].classList.add('correct');
      this.readingState.score++;
      const cheers = ['答對了！👏', '正確！理解力很好 ✨', '完美！🎉'];
      fb.innerHTML = `<div class="feedback success">${cheers[Math.floor(Math.random()*cheers.length)]}</div>`;
    } else {
      optionEls[idx].classList.add('wrong');
      optionEls[correct].classList.add('correct');
      const correctText = q.opts[correct];
      const explanation = q.explain || `正確答案是「${correctText}」。請回到文章中找和題目最直接相關的句子。`;
      fb.innerHTML = `<div class="feedback error">
        <strong>正確答案：${this.escapeHtml(correctText)}</strong><br>
        ${this.escapeHtml(explanation)}
      </div>`;
    }

    if (cur.answers.every(ans => ans !== null)) {
      document.getElementById('readingActions').innerHTML = `
        <button class="btn btn-primary" onclick="App.nextReading()" id="nextReadingBtn">${this.readingState.idx + 1 >= this.readingState.questions.length ? '看結果 →' : '下一篇 →'}</button>
      `;
      setTimeout(() => {
        const btn = document.getElementById('nextReadingBtn');
        if (btn) btn.focus();
      }, 80);
    }
  },

  nextReading() {
    this.readingState.idx++;
    this.render();
  },

  renderReadingFinish(area) {
    const s = this.readingState;
    const total = s.totalQuestions || s.questions.reduce((sum, item) => sum + item.qs.length, 0);
    const pct = total ? Math.round((s.score / total) * 100) : 0;
    let msg, emoji;
    if (pct === 100) { msg = '完美！閱讀理解滿分！'; emoji = '🏆'; }
    else if (pct >= 80) { msg = '閱讀力很好！'; emoji = '📚'; }
    else if (pct >= 60) { msg = '不錯！多讀一些英文短文會更上手！'; emoji = '💪'; }
    else { msg = '加油！多閱讀就會進步！'; emoji = '🌱'; }

    area.innerHTML = `
      <div class="result-screen">
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${msg}</div>
        <div class="result-score">${s.score} / ${total}</div>
        <div class="result-pct">正確率 ${pct}%</div>
      </div>
      <div class="action-row">
        <button class="btn btn-primary" onclick="App.restartReading()">再做一次 →</button>
      </div>
    `;
  }
};

// ============================================================
// Modal 控制
// ============================================================
function openResetModal() {
  document.getElementById('resetModal').classList.add('show');
}
function closeModal() {
  document.getElementById('resetModal').classList.remove('show');
}
function confirmReset() {
  Progress.reset();
  App.streak = 0;
  App.refreshPool();
  App.render();
  closeModal();
}

// ============================================================
// 鍵盤快捷鍵
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (App.currentMode === 'flashcard') {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      const card = document.getElementById('flashcard');
      if (card) card.click();
    } else if (e.key === 'ArrowRight' || e.key === 'n') {
      App.nextFlashcard();
    } else if (e.key === 's') {
      App.speakCurrent();
    }
  }
});

// ============================================================
// 啟動
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  App.init();
});

</script>

</html>
